name: runbookops
display_name: RunbookOps - CaseOps Benchmark
manifest_version: 1
version: 0.1.0
description: >-
  Deterministic operational case-handling environment for evaluating agent
  behavior in realistic customer-impact service exceptions and workflow
  resolution tasks.
author: RunbookOps Team
license: MIT
contact: help_openenvhackathon@scaler.com
documentation: README.md

tags:
  - openenv
  - case-ops
  - runbook
  - customer-operations
  - deterministic
  - evaluation
  - fastapi

metadata:
  domain: operational-case-handling
  offline: true
  deterministic: true
  synthetic_data_only: true
  total_scenarios: 15
  difficulty_distribution:
    easy: 5
    medium: 5
    hard: 5
  scenario_services:
    - auth
    - checkout
    - payments
    - email
    - search
    - notifications
    - platform

runtime:
  type: fastapi
  entrypoint: server.app:app
  entrypoints:
    http:
      app: server.app:app
      reset: /reset
      step: /step
      state: /state
  healthcheck_path: /health
  default_port: 7860
  runtime_constraints:
    max_inference_runtime_minutes: 20
    reference_hardware:
      vcpu: 2
      memory_gb: 8
  container:
    dockerfile: server/Dockerfile

api:
  reset:
    method: POST
    path: /reset
  step:
    method: POST
    path: /step
  state:
    method: GET
    path: /state
  tasks:
    method: GET
    path: /tasks
  scenarios:
    method: GET
    path: /scenarios
  grade:
    method: POST
    path: /grade
  score:
    method: POST
    path: /score

spec_alignment:
  interface:
    - typed Observation / Action / StepResult models (Pydantic)
    - reset() -> Observation
    - step(Action) -> StepResult
    - state() -> InternalStateSnapshot

spaces:
  action:
    type: structured
    model: Action
    fields:
      - name: action_type
        type: enum
        required: true
        values:
          - inspect_alert
          - inspect_log
          - inspect_runbook
          - inspect_timeline_note
          - set_severity
          - assign_team
          - submit_root_cause
          - submit_mitigation
          - add_note
          - resolve_incident
      - name: target
        type: string
        required: false
        nullable: true
      - name: content
        type: string
        required: false
        nullable: true
  observation:
    type: structured
    model: Observation
    notes:
      - Ground truth fields are hidden from observations.
      - Evidence appears incrementally through deterministic unlock conditions.

reward:
  type: dense
  trajectory_signal: true
  notes:
    - Rewards first-time relevant evidence collection and correct case-handling decisions.
    - Penalizes duplicate or irrelevant actions, unsafe early closure, and inefficient trajectories.

grading:
  type: deterministic_programmatic
  score_range: [0.0051, 0.9949]
  llm_judging: false
  rubric_weights:
    severity: 0.15
    owner_team: 0.15
    root_cause: 0.30
    mitigation: 0.25
    evidence_coverage: 0.10
    safe_resolution: 0.05

baseline:
  script: inference.py
  llm_client: openai
  required_env_vars:
    - API_BASE_URL
    - MODEL_NAME
    - HF_TOKEN

tasks:
  - id: easy
    difficulty: easy
    expected_steps: 5-8
    description: >-
      Single-primary-cause operational cases with limited false leads.
      Emphasis on basic evidence gathering and correct classification.
    scenarios:
      - easy_auth_token_expiry
      - easy_search_cache_stale
      - easy_email_queue_blocked
      - easy_platform_secret_rotation
      - easy_checkout_dependency_timeout

  - id: medium
    difficulty: medium
    expected_steps: 7-10
    description: >-
      Multi-hypothesis service issues where at least one plausible red herring
      appears. Requires cross-source evidence synthesis before resolution.
    scenarios:
      - medium_checkout_flag_rollout
      - medium_email_provider_vs_config
      - medium_auth_db_pool_exhaustion
      - medium_notifications_retry_storm
      - medium_payments_region_misroute

  - id: hard
    difficulty: hard
    expected_steps: 9-12
    description: >-
      Conflicting-signal operational cases with multiple plausible false leads.
      Strongly penalizes shallow, premature closure.
    scenarios:
      - hard_email_config_regression
      - hard_checkout_partial_outage
      - hard_auth_multi_signal_conflict
      - hard_search_index_pipeline_failure
      - hard_payments_shadow_traffic_issue

submission_readiness:
  deterministic_offline_logic: true
  scenario_count: 15
  tiered_difficulty: true
  baseline_script: inference.py
  test_suite: tests/
  smoke_script: scripts/smoke_test.py
